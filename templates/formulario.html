{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card bg-secondary shadow-lg">
            <div class="card-body">

                <h3 class="text-center mb-4">
                    {% if producto %}
                        ✏ Editar Producto
                    {% else %}
                        ➕ Agregar Producto
                    {% endif %}
                </h3>

                <form 
                    action="{% if producto %}/actualizar/{{ producto.id }}{% else %}/guardar{% endif %}" 
                    method="POST"
                    enctype="multipart/form-data">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" name="nombre" class="form-control"
                               value="{{ producto.nombre if producto else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3" required>{{ producto.descripcion if producto else '' }}</textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Precio</label>
                        <input type="text" 
                            id="precio"
                            name="precio"
                            class="form-control"
                            value="{{ '{:,.0f}'.format(producto.precio).replace(',', '.') if producto else '' }}"
                            required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" name="stock" class="form-control"
                               value="{{ producto.stock if producto else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Imagen</label>
                        <input type="file" name="imagen" class="form-control">
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            💾 Guardar
                        </button>
                    </div>

                    <div class="text-center mt-3">
                        <a href="/productos" class="btn btn-outline-light btn-sm">
                            ← Volver
                        </a>
                    </div>

                </form>

            </div>
        </div>

    </div>
</div>
<script>
const inputPrecio = document.getElementById("precio");

function formatearMiles(valor) {
    valor = valor.replace(/\D/g, ""); // eliminar todo lo que no sea número
    return valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

inputPrecio.addEventListener("input", function(e) {
    let valor = e.target.value;
    e.target.value = formatearMiles(valor);
});

document.querySelector("form").addEventListener("submit", function() {
    // quitar puntos antes de enviar al backend
    inputPrecio.value = inputPrecio.value.replace(/\./g, "");
});
</script>
{% endblock %}
